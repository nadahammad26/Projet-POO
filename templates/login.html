{% extends 'base.html' %}

{% block extra_css %}
<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
    }

    .login-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 3rem;
        width: 100%;
        max-width: 450px;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .login-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .login-header h2 {
        font-family: 'Outfit', sans-serif;
        font-size: 2rem;
        color: #fff;
        margin-bottom: 0.5rem;
    }

    .login-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-group label {
        display: block;
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        font-weight: 500;
    }

    .form-control {
        width: 100%;
        padding: 0.8rem 1rem;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-family: inherit;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .btn-submit {
        width: 100%;
        background: linear-gradient(to right, var(--primary), var(--accent));
        color: white;
        border: none;
        padding: 1rem;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        margin-top: 1rem;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(236, 72, 153, 0.3);
    }

    .register-link {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.9rem;
    }
    .register-link a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
    }
    .register-link a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container animate-in">
    <div class="login-card">
        <div class="login-header">
            <h2>Bienvenue</h2>
            <p>Connectez-vous à l'espace membre</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Adresse Email</label>
                <input type="email" name="email" class="form-control" required placeholder="nom@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Connexion sécurisée</button>
        </form>

        <div class="register-link">
            <p>Pas encore de compte ? <a href="/register">Créer un compte</a></p>
        </div>
    </div>
</div>
{% endblock %}
